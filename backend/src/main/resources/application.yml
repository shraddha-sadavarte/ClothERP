spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/clotherp
    username: postgres
    password: postgres@123
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update        # change to 'validate' in production
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: core
        format_sql: true
  data:
    redis:
      host: localhost
      port: 6379
      repositories:
        enabled: false

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:your-very-long-secret-key-at-least-32-chars}
    expiration: 900000          # 15 min
    refresh-expiration: 604800000 # 7 days (matches Redis TTL if you set it accordingly)
